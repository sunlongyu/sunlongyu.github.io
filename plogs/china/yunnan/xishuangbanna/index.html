  <div class="plogs-lightbox" id="plogsLightbox" hidden>
    <button class="plogs-lightbox-close" type="button" aria-label="Close photo viewer">&times;</button>
    <button class="plogs-lightbox-nav plogs-lightbox-prev" type="button" aria-label="Previous photo">&#10094;</button>
    <figure class="plogs-lightbox-stage">
      <img id="plogsLightboxImage" src="" alt="">
    </figure>
    <button class="plogs-lightbox-nav plogs-lightbox-next" type="button" aria-label="Next photo">&#10095;</button>
  </div>

  <script>
    (() => {
      const triggers = Array.from(document.querySelectorAll(".plogs-photo-trigger"));
      const lightbox = document.getElementById("plogsLightbox");
      const image = document.getElementById("plogsLightboxImage");
      if (!triggers.length || !lightbox || !image) return;

      const closeButton = lightbox.querySelector(".plogs-lightbox-close");
      const prevButton = lightbox.querySelector(".plogs-lightbox-prev");
      const nextButton = lightbox.querySelector(".plogs-lightbox-next");
      let currentIndex = 0;

      const photos = triggers.map((trigger) => ({
        src: trigger.dataset.plogsPhoto,
        alt: trigger.dataset.plogsAlt || "Photo"
      }));

      const render = (index) => {
        currentIndex = (index + photos.length) % photos.length;
        image.src = photos[currentIndex].src;
        image.alt = photos[currentIndex].alt;
      };

      const open = (index) => {
        render(index);
        lightbox.hidden = false;
        document.body.classList.add("plogs-lightbox-open");
      };

      const close = () => {
        lightbox.hidden = true;
        image.src = "";
        document.body.classList.remove("plogs-lightbox-open");
      };

      triggers.forEach((trigger, index) => {
        trigger.addEventListener("click", () => open(index));
      });

      prevButton.addEventListener("click", () => render(currentIndex - 1));
      nextButton.addEventListener("click", () => render(currentIndex + 1));
      closeButton.addEventListener("click", close);

      lightbox.addEventListener("click", (event) => {
        if (event.target === lightbox) close();
      });

      document.addEventListener("keydown", (event) => {
        if (lightbox.hidden) return;
        if (event.key === "Escape") close();
        if (event.key === "ArrowLeft") render(currentIndex - 1);
        if (event.key === "ArrowRight") render(currentIndex + 1);
      });
    })();
  </script>
