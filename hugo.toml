## Basic Configuration

baseurl = "https://sunlongyu.github.io/"
builddrafts = false
canonifyurls = false
languageCode = "zh-cn"

contentdir = "content"
layoutdir = "layouts"
publishdir = "public"

author = "sunlongyu"
title = "Sun longyu"

theme = "hugo-goa"

## Taxonomies
[taxonomies]
category = "categories"
tag = "tags"

## Hugo Built-in Features
# disqusShortname = "discusShortname" # Enable if you want to use Disqus
# googleAnalytics = "UA-XXXXXXXX-X" # Enable if you want to use Google Analytics
enableRobotsTXT = true

## Markup Configuration
[markup]
  [markup.goldmark]
    [markup.goldmark.renderer]
      unsafe = true  # 允许在 Markdown 中渲染 HTML

## Site Settings
[params]
author = "SLY"
intro = "CS Master Student"
description = "Welcome To SLY'S World"
[params.home]
about = """
Welcome to SLY'S world, I'm Sun Longyu from Nanchang, Jiangxi. Currently, I am a master student in Guangzhou University, majoring in Computer Technology in the School of Cyberspace Security, a member of [Blockchain and Reputation Systems Research Group](blockchain-neu.com).From 2019-2023, I studied in Jiangxi University of Science and Technology, and I was awarded the National Scholarship, Academician Zhang Wenhai Scholarship, and Haopeng Science and Technology Scholarship, etc., and I received my Bachelor's Degree of Engineering in June 2023.I love to write music when I study.

I love to create music after studying, my style involves pop, R&B, hiphop, rock and so on, you can hear my works on [netease cloudmusic](https://music.163.com/#/user/home?id=406543726) and [bilibili](https://space.bilibili.com/442035963?spm_id_from=333.1007.0.0); at the same time I also like sports, all kinds of sports have dabbled in, which has a penchant for basketball, you can find in the [Rednote](https://www.xiaohongshu.com/user/profile/5fef0ba300000000010003ec?xhsshare=CopyLink&appuid=5fef0ba300000000010003ec&apptime=1693723319)platform to follow me, I'll share some of my life on it!

My blogs mainly focuses on the computer field, and most of it is about what I have learned in the process of learning, hoping to improve myself and help others at the same time. I am deeply passionate about this field, and I hope to share my insights and experiences through my blog, which will hopefully be of value to everyone. In addition to this, I hope you will also see my music as well as video work posted on other platforms.

If you have any questions, suggestions or want to share your thoughts with me, you can contact me via email. Also, you can follow me on my social media platforms.

Thank you for visiting my blog! I'm looking forward to sharing interesting content and experiences with you.
"""
authorimage = "profile/sly.png"
dateformat = "Jan 2, 2006"
favicon="favicon.ico"

