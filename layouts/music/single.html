{{ partial "header.html" . }}

<div class="music-page-wrapper">
  {{ partial "content.html" . }}
</div>

{{ if ne .Params.showcomments false }}
{{ template "_internal/disqus.html" . }}
{{ end }}

{{ partial "menu.html" . }}

{{ partial "footer.html" . }}

<style>
/* 确保音乐页面的样式正确加载 */
.music-page-wrapper {
  min-height: 60vh;
}

/* 如果自定义CSS没有加载，这里提供备用样式 */
.music-player-container {
  max-width: 800px;
  margin: 2rem auto;
  padding: 0 1rem;
}

.playlist-header {
  text-align: center;
  margin-bottom: 2rem;
  padding: 1.5rem;
  background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
  border-radius: 15px;
  color: white;
  box-shadow: 0 8px 32px rgba(0, 0, 0, 0.1);
}

.music-list {
  display: flex;
  flex-direction: column;
  gap: 1.5rem;
}

.music-item {
  display: flex;
  align-items: center;
  padding: 1.5rem;
  background: #ffffff;
  border-radius: 12px;
  box-shadow: 0 4px 20px rgba(0, 0, 0, 0.08);
  transition: all 0.3s ease;
  border: 1px solid #f0f0f0;
}

.music-item:hover {
  transform: translateY(-2px);
  box-shadow: 0 8px 30px rgba(0, 0, 0, 0.12);
  border-color: #667eea;
}

.music-cover {
  position: relative;
  width: 80px;
  height: 80px;
  margin-right: 1.5rem;
  border-radius: 8px;
  overflow: hidden;
  cursor: pointer;
}

.music-cover img {
  width: 100%;
  height: 100%;
  object-fit: cover;
  transition: transform 0.3s ease;
}

.play-overlay {
  position: absolute;
  top: 0;
  left: 0;
  right: 0;
  bottom: 0;
  background: rgba(0, 0, 0, 0.6);
  display: flex;
  align-items: center;
  justify-content: center;
  opacity: 0;
  transition: opacity 0.3s ease;
}

.music-cover:hover .play-overlay {
  opacity: 1;
}

.play-btn {
  color: white;
  font-size: 1.5rem;
  cursor: pointer;
}

.music-info {
  flex: 1;
  min-width: 0;
}

.song-title {
  margin: 0 0 0.5rem 0;
  font-size: 1.3rem;
  font-weight: 600;
  color: #333;
}

.artist-name {
  margin: 0 0 0.8rem 0;
  color: #667eea;
  font-weight: 500;
}

.song-description {
  margin: 0 0 1rem 0;
  color: #666;
  font-size: 0.9rem;
  line-height: 1.5;
}

.song-meta {
  display: flex;
  gap: 1rem;
  font-size: 0.85rem;
  color: #999;
}

.netease-link {
  display: inline-flex;
  align-items: center;
  gap: 0.5rem;
  padding: 0.6rem 1.2rem;
  background: #d33a31;
  color: white !important;
  text-decoration: none;
  border-radius: 6px;
  font-size: 0.85rem;
  font-weight: 500;
  transition: all 0.3s ease;
}

.netease-link:hover {
  background: #b8302a;
  transform: translateY(-1px);
}

.netease-player-section {
  margin: 3rem 0;
  padding: 2rem;
  background: #f8f9fa;
  border-radius: 12px;
  border: 1px solid #e9ecef;
}

.netease-player-section iframe {
  border-radius: 8px;
  box-shadow: 0 4px 20px rgba(0, 0, 0, 0.1);
}

@media (max-width: 768px) {
  .music-item {
    flex-direction: column;
    text-align: center;
    padding: 1.2rem;
  }
  
  .music-cover {
    margin-right: 0;
    margin-bottom: 1rem;
    width: 100px;
    height: 100px;
  }
  
  .music-actions {
    margin-left: 0;
    margin-top: 1rem;
  }
}
</style>
