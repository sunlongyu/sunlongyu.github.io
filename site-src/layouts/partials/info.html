<section id="info-pane" class="text-center info">
  {{ with .Site.Params.intro }}
  <h3 class="intro">{{ . | markdownify }}</h3>
  {{ end }}
  {{ with .Site.Params.description }}
  <h4 class="description">{{ . | markdownify }}</h4>
  {{ end }}

  {{ with .Content }}
  <div class="home-bio">
    {{ . }}
  </div>
  {{ end }}

  {{ if .Site.Params.waline.serverURL }}
  <p class="home-visitor-counter">visits <span class="waline-pageview-count" data-path="/">0</span></p>
  {{ end }}
</section>
